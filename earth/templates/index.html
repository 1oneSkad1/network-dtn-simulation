<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EARTH - ALIEN ALIEN STATION</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Inter:wght@900&display=swap');

        :root {
            --nayuta-blue: #00A3D3;
            --nayuta-white: #FFFFFF;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--nayuta-blue);
            font-family: 'Inter', 'Black Han Sans', sans-serif;
            color: var(--nayuta-white);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            text-transform: uppercase;
        }

        .container {
            text-align: center;
            width: 100%;
            max-width: 600px;
            position: relative;
        }

        .alien-head {
            width: 80px;
            height: 60px;
            background: var(--nayuta-white);
            border-radius: 50% 50% 45% 45%;
            margin: 0 auto 20px;
            position: relative;
        }
        .alien-head::before, .alien-head::after {
            content: '';
            position: absolute;
            width: 12px;
            height: 25px;
            background: var(--nayuta-blue);
            border-radius: 50%;
            top: 15px;
        }
        .alien-head::before { left: 20px; transform: rotate(15deg); }
        .alien-head::after { right: 20px; transform: rotate(-15deg); }
        
        .antenna {
            position: absolute;
            width: 4px;
            height: 20px;
            background: var(--nayuta-white);
            top: -15px;
            left: 50%;
            transform: translateX(-50%);
        }
        .antenna::after {
            content: '';
            position: absolute;
            width: 10px;
            height: 10px;
            background: var(--nayuta-white);
            border-radius: 50%;
            top: -8px;
            left: -3px;
        }

        h1 {
            font-size: 4rem;
            margin: 0;
            letter-spacing: -2px;
            line-height: 0.9;
        }

        .status-badge {
            display: inline-block;
            background: var(--nayuta-white);
            color: var(--nayuta-blue);
            padding: 5px 15px;
            font-weight: 900;
            margin-bottom: 30px;
        }

        .upload-box {
            background: var(--nayuta-white);
            padding: 40px;
            border-radius: 0;
        }

        input[type="file"] {
            display: block;
            width: 100%;
            margin-bottom: 20px;
            color: var(--nayuta-blue);
            font-weight: bold;
        }

        button {
            background: var(--nayuta-blue);
            color: var(--nayuta-white);
            border: none;
            padding: 15px 40px;
            font-size: 1.5rem;
            font-weight: 900;
            cursor: pointer;
            transition: transform 0.1s;
        }

        button:hover { transform: scale(1.05); }

        .log-container {
            margin-top: 30px;
            background: rgba(0, 0, 0, 0.3);
            padding: 15px;
            text-align: left;
            border-left: 5px solid var(--nayuta-white);
        }
        .log-container h3 { margin: 0 0 10px; font-size: 1rem; }
        #logs {
            font-family: monospace;
            font-size: 0.8rem;
            height: 100px;
            overflow-y: auto;
            margin: 0;
            white-space: pre-wrap;
        }

        .signal-container {
            position: relative;
            height: 50px;
            margin-bottom: 20px;
            display: none;
        }
        .wave {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 20px;
            height: 20px;
            border: 4px solid var(--nayuta-white);
            border-radius: 50%;
            animation: ripple 2s infinite;
            opacity: 0;
        }
        .wave:nth-child(2) { animation-delay: 0.5s; }
        .wave:nth-child(3) { animation-delay: 1s; }

        @keyframes ripple {
            0% { width: 20px; height: 20px; opacity: 1; }
            100% { width: 200px; height: 200px; opacity: 0; }
        }

        #messageBox {
            margin-top: 20px;
            font-weight: 900;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="alien-head"><div class="antenna"></div></div>
        <h1>ALIEN ALIEN<br>EARTH</h1>
        <div class="status-badge">NODE 01 STATUS: <span id="nodeStatus">LOADING...</span></div>
        
        <div class="signal-container" id="signal">
            <div class="wave"></div>
            <div class="wave"></div>
            <div class="wave"></div>
        </div>

        <div class="upload-box">
            <form id="uploadForm">
                <input type="file" name="file" id="fileInput" required>
                <button type="submit" id="transmitBtn">TRANSMIT</button>
            </form>
        </div>

        <div class="log-container">
            <h3>COMMUNICATION LOGS</h3>
            <pre id="logs">Connecting to DSN...</pre>
        </div>
        <div id="messageBox"></div>
    </div>

    <script>
        const uploadForm = document.getElementById('uploadForm');
        const signal = document.getElementById('signal');
        const messageBox = document.getElementById('messageBox');
        const transmitBtn = document.getElementById('transmitBtn');

        uploadForm.onsubmit = async (e) => {
            e.preventDefault();
            
            signal.style.display = 'block';
            messageBox.textContent = 'TRANSMITTING SIGNAL TO MARS...';
            transmitBtn.disabled = true;

            const formData = new FormData();
            formData.append('file', document.getElementById('fileInput').files[0]);

            try {
                const response = await fetch('/upload', {
                    method: 'POST',
                    body: formData
                });
                const result = await response.json();
                
                messageBox.textContent = result.message;
                messageBox.style.color = result.status === 'success' ? 'var(--nayuta-white)' : 'red';
            } catch (err) {
                messageBox.textContent = 'SIGNAL LOST OR TRANSMISSION ERROR';
                messageBox.style.color = 'red';
            } finally {
                signal.style.display = 'none';
                transmitBtn.disabled = false;
            }
        };

        function updateStatus() {
            fetch('/status')
                .then(r => r.json())
                .then(data => {
                    const el = document.getElementById('nodeStatus');
                    el.textContent = data.status;
                    el.style.color = data.status === 'Running' ? 'var(--nayuta-blue)' : 'red';
                });
        }

        function fetchLogs() {
            fetch('/logs')
                .then(response => response.text())
                .then(data => {
                    document.getElementById('logs').textContent = data;
                });
        }

        setInterval(updateStatus, 5000);
        setInterval(fetchLogs, 2000);
        updateStatus();
    </script>
</body>
</html>
